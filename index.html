<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>習慣ルーティン</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --sub: #86868b;
    --line: #e5e5ea;
    --accent: #34c759;
    --danger: #ff3b30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 24px 16px 80px;
    max-width: 560px;
    margin: 0 auto;
  }
  header { margin-bottom: 20px; }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .date { color: var(--sub); font-size: 14px; margin-top: 2px; }

  .summary {
    display: flex;
    gap: 10px;
    margin: 18px 0;
  }
  .stat {
    flex: 1;
    background: var(--card);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
  }
  .stat .num { font-size: 24px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: var(--sub); margin-top: 2px; }

  .add {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .add input {
    flex: 1;
    border: none;
    background: var(--card);
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    outline: none;
  }
  .add button {
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    width: 52px;
    border-radius: 12px;
    cursor: pointer;
  }

  ul { list-style: none; }
  li {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    transition: opacity .2s;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  li.dragging {
    opacity: .9;
    box-shadow: 0 8px 24px rgba(0,0,0,.15);
    transform: scale(1.02);
    touch-action: none;
  }
  .check {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 2px solid var(--line);
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #fff;
    transition: all .15s;
  }
  li.done .check { background: var(--accent); border-color: var(--accent); }
  .body { flex: 1; min-width: 0; }
  .name { font-size: 16px; font-weight: 500; }
  li.done .name { color: var(--sub); text-decoration: line-through; }
  .streak { font-size: 12px; color: var(--sub); margin-top: 1px; }
  .streak.hot { color: #ff9500; }
  .del {
    border: none; background: none; color: var(--sub);
    font-size: 18px; cursor: pointer; padding: 4px 6px; flex-shrink: 0;
  }
  .del:hover { color: var(--danger); }
  .handle {
    flex-shrink: 0;
    color: var(--sub);
    font-size: 22px;
    padding: 8px 6px;
    cursor: grab;
    touch-action: none;
    user-select: none;
  }
  .handle:active { cursor: grabbing; }

  .empty { text-align: center; color: var(--sub); padding: 40px 0; font-size: 14px; }

  /* 削除確認ダイアログ */
  .backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    align-items: center; justify-content: center;
    padding: 24px; z-index: 10;
  }
  .backdrop.show { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 16px;
    padding: 22px;
    width: 100%; max-width: 320px;
    text-align: center;
  }
  .modal-text { font-size: 16px; font-weight: 500; margin-bottom: 18px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1; border: none; border-radius: 12px;
    padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-cancel { background: var(--line); color: var(--text); }
  .btn-del { background: var(--danger); color: #fff; }
</style>

<header>
  <h1>習慣ルーティン</h1>
  <div class="date" id="date"></div>
</header>

<div class="summary">
  <div class="stat"><div class="num" id="s-done">0</div><div class="lbl">今日の達成</div></div>
  <div class="stat"><div class="num" id="s-rate">0%</div><div class="lbl">達成率</div></div>
  <div class="stat"><div class="num" id="s-best">0</div><div class="lbl">最長ストリーク</div></div>
</div>

<div class="add">
  <input id="input" type="text" placeholder="新しい習慣を追加" maxlength="40">
  <button id="addBtn">＋</button>
</div>

<ul id="list"></ul>
<div class="empty" id="empty">習慣を追加して、毎日の積み重ねを始めましょう。</div>

<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="modal-text" id="modal-text"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">キャンセル</button>
      <button class="btn-del" id="modal-ok">削除</button>
    </div>
  </div>
</div>

<script>
const KEY = 'habit-routine-v1';
const todayStr = () => new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD

let habits = load();

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch { return []; }
}
function save() { localStorage.setItem(KEY, JSON.stringify(habits)); }

// 昨日以前のチェックは日付が変わればリセットされる（doneはlastDoneで判定）
function isDoneToday(h) { return h.lastDone === todayStr(); }

function yesterdayStr() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toLocaleDateString('sv-SE');
}

function toggle(id) {
  const h = habits.find(x => x.id === id);
  if (!h) return;
  if (isDoneToday(h)) {
    // 取り消し
    h.streak = Math.max(0, h.streak - 1);
    h.lastDone = h.streak > 0 ? yesterdayStr() : null;
  } else {
    // 達成：昨日も達成していれば連続、そうでなければ1から
    h.streak = (h.lastDone === yesterdayStr()) ? h.streak + 1 : 1;
    h.lastDone = todayStr();
    if (h.streak > h.best) h.best = h.streak;
  }
  save(); render();
}

function add() {
  const el = document.getElementById('input');
  const name = el.value.trim();
  if (!name) return;
  habits.push({ id: Date.now(), name, streak: 0, best: 0, lastDone: null });
  el.value = '';
  save(); render();
}

let pendingDelId = null;
function del(id) {
  const h = habits.find(x => x.id === id);
  if (!h) return;
  pendingDelId = id;
  document.getElementById('modal-text').textContent = `「${h.name}」を削除しますか？`;
  document.getElementById('backdrop').classList.add('show');
}
function closeModal() {
  document.getElementById('backdrop').classList.remove('show');
  pendingDelId = null;
}

// 連続が途切れた習慣のstreakを表示前に補正
function refreshStreaks() {
  const t = todayStr(), y = yesterdayStr();
  habits.forEach(h => {
    if (h.lastDone && h.lastDone !== t && h.lastDone !== y) h.streak = 0;
  });
}

// ドラッグ並べ替え（タッチ・マウス両対応）
// ・≡ハンドル → すぐ移動開始
// ・行を長押し → どこを掴んでも移動開始
function attachDrag(li) {
  li.querySelector('.handle').addEventListener('pointerdown', e => {
    e.preventDefault();
    beginDrag(li);
  });

  let holdTimer = null, startY = 0;
  const cancelHold = () => { if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; } };
  li.addEventListener('pointerdown', e => {
    if (e.target.closest('.check, .del, .handle')) return; // タップ操作は邪魔しない
    startY = e.clientY;
    holdTimer = setTimeout(() => { holdTimer = null; beginDrag(li); }, 250);
  });
  li.addEventListener('pointermove', e => {
    if (holdTimer && Math.abs(e.clientY - startY) > 8) cancelHold(); // スクロールならキャンセル
  });
  li.addEventListener('pointerup', cancelHold);
  li.addEventListener('pointercancel', cancelHold);
}

function beginDrag(li) {
  const list = document.getElementById('list');
  li.classList.add('dragging');

  const move = ev => {
    ev.preventDefault();
    const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const after = afterElement(list, y);
    if (after == null) list.appendChild(li);
    else list.insertBefore(li, after);
  };
  const up = () => {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    document.removeEventListener('pointercancel', up);
    li.classList.remove('dragging');
    // DOMの並び順を配列に反映して保存
    const ids = [...list.children].map(el => Number(el.dataset.id));
    habits.sort((a, b) => ids.indexOf(a.id) - ids.indexOf(b.id));
    save(); render();
  };
  document.addEventListener('pointermove', move, { passive: false });
  document.addEventListener('pointerup', up);
  document.addEventListener('pointercancel', up);
}

function afterElement(list, y) {
  const els = [...list.querySelectorAll('li:not(.dragging)')];
  return els.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: -Infinity }).element;
}

function render() {
  refreshStreaks();
  const list = document.getElementById('list');
  list.innerHTML = '';
  habits.forEach(h => {
    const done = isDoneToday(h);
    const li = document.createElement('li');
    if (done) li.className = 'done';
    li.dataset.id = h.id;
    li.innerHTML = `
      <div class="check">${done ? '✓' : ''}</div>
      <div class="body">
        <div class="name"></div>
        <div class="streak ${h.streak >= 3 ? 'hot' : ''}">${h.streak > 0 ? '🔥 ' + h.streak + '日連続' : 'これから'}</div>
      </div>
      <button class="del">✕</button>
      <div class="handle" title="ドラッグして並べ替え">≡</div>`;
    li.querySelector('.name').textContent = h.name;
    li.querySelector('.check').onclick = () => toggle(h.id);
    li.querySelector('.del').onclick = () => del(h.id);
    attachDrag(li);
    list.appendChild(li);
  });

  const doneCount = habits.filter(isDoneToday).length;
  const total = habits.length;
  document.getElementById('s-done').textContent = `${doneCount}/${total}`;
  document.getElementById('s-rate').textContent = total ? Math.round(doneCount / total * 100) + '%' : '0%';
  document.getElementById('s-best').textContent = habits.reduce((m, h) => Math.max(m, h.best), 0);
  document.getElementById('empty').style.display = total ? 'none' : 'block';
}

document.getElementById('date').textContent =
  new Date().toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'long' });
document.getElementById('addBtn').onclick = add;
document.getElementById('input').addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
document.getElementById('modal-cancel').onclick = closeModal;
document.getElementById('modal-ok').onclick = () => {
  habits = habits.filter(x => x.id !== pendingDelId);
  save(); closeModal(); render();
};
document.getElementById('backdrop').onclick = e => { if (e.target.id === 'backdrop') closeModal(); };

render();
</script>
